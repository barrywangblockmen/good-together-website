server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gtclub.tw www.gtclub.tw;

    ssl_certificate /etc/letsencrypt/live/gtclub.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gtclub.tw/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # 活動照片：不走限流（一次可載入多張）
    location ^~ /activities/ {
        alias /var/www/good-together/public/activities/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Next 靜態資源：不走限流
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        limit_conn perip_conn 40;
        # Next.js RSC prefetch 會短時間並行多個請求，burst 需放寬
        limit_req zone=perip_req burst=80 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name gtclub.tw www.gtclub.tw;
    return 301 https://$host$request_uri;
}
